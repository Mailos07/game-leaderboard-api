<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Leaderboard — CSC 575</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 40%, #0d1b2a 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e2e8f0;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 100;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
        }

        .header {
            padding: 24px 32px;
            background: linear-gradient(180deg, rgba(59,130,246,0.15) 0%, transparent 100%);
            border-bottom: 1px solid rgba(59,130,246,0.2);
        }
        .header-inner { max-width: 1000px; margin: 0 auto; }
        .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
        .header-top .icon { font-size: 32px; }
        .header h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .subtitle { font-size: 13px; color: #64748b; padding-left: 44px; }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-top: 20px; padding-left: 44px; }
        .tab {
            padding: 8px 20px; border: none; border-radius: 6px 6px 0 0;
            font-size: 13px; font-weight: 600; cursor: pointer;
            background: transparent; color: #64748b;
            border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .tab.active { background: rgba(59,130,246,0.2); color: #60a5fa; border-bottom-color: #3b82f6; }
        .tab:hover { color: #94a3b8; }

        .main { max-width: 1000px; margin: 0 auto; padding: 24px 32px; }

        /* Game selector */
        .game-selector { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .game-label { font-size: 12px; color: #64748b; margin-right: 4px; }
        .game-btn {
            padding: 6px 16px; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
            letter-spacing: 0.5px; background: rgba(255,255,255,0.03); color: #94a3b8;
        }
        .game-btn.active { background: rgba(59,130,246,0.2); border-color: #3b82f6; color: #60a5fa; }

        /* Leaderboard */
        .lb-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .lb-header h2 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
        .lb-header h2 span { color: #60a5fa; }
        .refresh-btn {
            padding: 6px 16px; background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3); border-radius: 6px;
            color: #60a5fa; font-size: 12px; font-weight: 600; cursor: pointer;
        }

        .grid-header {
            display: grid; grid-template-columns: 60px 1fr 1fr 140px 100px;
            padding: 8px 16px; font-size: 11px; font-weight: 700;
            color: #475569; text-transform: uppercase; letter-spacing: 1px;
        }
        .entry {
            display: grid; grid-template-columns: 60px 1fr 1fr 140px 100px;
            align-items: center; padding: 12px 16px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02); margin-bottom: 6px;
            transition: all 0.2s;
        }
        .entry:hover { background: rgba(255,255,255,0.04); }
        .entry.gold {
            background: linear-gradient(135deg, rgba(250,204,21,0.1), rgba(250,204,21,0.03));
            border-color: rgba(250,204,21,0.2);
        }
        .entry.silver {
            background: linear-gradient(135deg, rgba(148,163,184,0.1), rgba(148,163,184,0.03));
            border-color: rgba(148,163,184,0.15);
        }
        .entry.bronze {
            background: linear-gradient(135deg, rgba(217,119,6,0.1), rgba(217,119,6,0.03));
            border-color: rgba(217,119,6,0.15);
        }
        .rank { font-weight: 800; }
        .rank.medal { font-size: 22px; }
        .rank.normal { font-size: 14px; color: #64748b; }
        .name { font-weight: 700; font-size: 15px; }
        .name.gold { color: #fbbf24; }
        .name.silver { color: #94a3b8; }
        .name.bronze { color: #d97706; }
        .pid { font-size: 12px; color: #475569; font-family: monospace; }
        .score { text-align: right; font-weight: 800; font-size: 18px; font-family: monospace; }
        .score.top { color: #fbbf24; }
        .time { text-align: right; font-size: 10px; color: #475569; }

        .empty {
            text-align: center; padding: 60px 20px;
            background: rgba(255,255,255,0.02); border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        .empty .big { font-size: 48px; margin-bottom: 12px; }
        .empty p { color: #64748b; }

        /* Submit form */
        .form-card {
            max-width: 480px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 32px;
        }
        .form-card h2 { margin-bottom: 24px; font-size: 18px; font-weight: 700; }
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 12px; font-weight: 600;
            color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .field input, .field select {
            width: 100%; padding: 10px 14px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: #e2e8f0;
            font-size: 14px; outline: none;
        }
        .field input:focus, .field select:focus {
            border-color: rgba(59,130,246,0.5);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
        }
        .submit-btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; letter-spacing: 0.5px; margin-top: 4px;
        }
        .submit-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* Player lookup */
        .search-bar { display: flex; gap: 8px; margin-bottom: 24px; }
        .search-bar input {
            flex: 1; padding: 10px 14px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: #e2e8f0; font-size: 14px; outline: none;
        }
        .search-bar input:focus {
            border-color: rgba(59,130,246,0.5);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
        }
        .search-btn {
            padding: 10px 24px; border: none; border-radius: 6px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
        }

        .rank-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 12px; padding: 24px; margin-bottom: 16px;
        }
        .rank-card h3 { margin-bottom: 16px; font-size: 16px; color: #60a5fa; }
        .stats { display: flex; gap: 32px; flex-wrap: wrap; }
        .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 36px; font-weight: 800; }
        .stat-value.rank-num { color: #fbbf24; }
        .stat-value.total { color: #94a3b8; }

        .nearby-title { font-size: 12px; color: #64748b; margin: 20px 0 8px; text-transform: uppercase; }
        .nearby-row {
            display: flex; justify-content: space-between; padding: 8px 12px;
            border-radius: 6px; margin-bottom: 4px; background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }
        .nearby-row.highlight {
            background: rgba(59,130,246,0.15);
            border-color: rgba(59,130,246,0.3);
            font-weight: 700;
        }
        .nearby-score { font-family: monospace; font-weight: 700; }

        .history-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 12px; padding: 24px;
        }
        .history-card h3 { margin-bottom: 16px; font-size: 16px; color: #a78bfa; }
        .history-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; border-radius: 6px; margin-bottom: 4px;
            background: rgba(255,255,255,0.02);
        }
        .history-game { font-weight: 600; }
        .history-time { font-size: 11px; color: #64748b; margin-left: 12px; }
        .history-score { font-family: monospace; font-weight: 800; font-size: 16px; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px; z-index: 200;
            padding: 12px 24px; border-radius: 8px; color: #fff;
            font-weight: 600; font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #059669; }
        .toast.error { background: #dc2626; }

        .footer {
            text-align: center; padding: 32px; font-size: 11px; color: #334155;
            border-top: 1px solid rgba(255,255,255,0.03); margin-top: 40px;
        }

        .loading { text-align: center; padding: 60px 0; color: #64748b; }
        .spinner { font-size: 32px; margin-bottom: 8px; animation: spin 1s linear infinite; display: inline-block; }

        .hidden { display: none; }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Header -->
    <div class="header">
        <div class="header-inner">
            <div class="header-top">
                <span class="icon">🎮</span>
                <h1>GAME LEADERBOARD</h1>
            </div>
            <p class="subtitle">Real-time rankings powered by AWS DynamoDB + Lambda</p>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
                <button class="tab" onclick="switchTab('submit')">⚡ Submit Score</button>
                <button class="tab" onclick="switchTab('player')">🔍 Player Lookup</button>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- Game selector -->
        <div class="game-selector">
            <span class="game-label">GAME:</span>
            <button class="game-btn active" onclick="selectGame('battle-royale')">battle-royale</button>
            <button class="game-btn" onclick="selectGame('puzzle-quest')">puzzle-quest</button>
            <button class="game-btn" onclick="selectGame('speed-racer')">speed-racer</button>
            <button class="game-btn" onclick="selectGame('tower-defense')">tower-defense</button>
        </div>

        <!-- Leaderboard View -->
        <div id="view-leaderboard">
            <div class="lb-header">
                <h2>Top Players — <span id="lb-game-name">battle-royale</span></h2>
                <button class="refresh-btn" onclick="fetchLeaderboard()">↻ Refresh</button>
            </div>
            <div id="lb-content"></div>
        </div>

        <!-- Submit View -->
        <div id="view-submit" class="hidden">
            <div class="form-card">
                <h2>⚡ Submit New Score</h2>
                <div class="field">
                    <label>Player ID</label>
                    <input type="text" id="f-playerId" placeholder="e.g. p5">
                </div>
                <div class="field">
                    <label>Player Name</label>
                    <input type="text" id="f-playerName" placeholder="e.g. Sarah">
                </div>
                <div class="field">
                    <label>Score</label>
                    <input type="number" id="f-score" placeholder="e.g. 8500">
                </div>
                <div class="field">
                    <label>Game</label>
                    <select id="f-gameId">
                        <option value="battle-royale">battle-royale</option>
                        <option value="puzzle-quest">puzzle-quest</option>
                        <option value="speed-racer">speed-racer</option>
                        <option value="tower-defense">tower-defense</option>
                    </select>
                </div>
                <button class="submit-btn" onclick="submitScore()">SUBMIT SCORE</button>
            </div>
        </div>

        <!-- Player Lookup View -->
        <div id="view-player" class="hidden">
            <div class="search-bar">
                <input type="text" id="f-lookup" placeholder="Enter Player ID (e.g. p1)" onkeydown="if(event.key==='Enter')lookupPlayer()">
                <button class="search-btn" onclick="lookupPlayer()">Search</button>
            </div>
            <div id="player-content"></div>
        </div>
    </div>

    <div class="footer">
        CSC 575 / SER 375 — Cloud Computing — Powered by DynamoDB • Lambda • API Gateway
    </div>

    <script>
        const API = "https://8nu5u7m00i.execute-api.us-east-1.amazonaws.com/Prod";
        let currentGame = "battle-royale";
        let currentTab = "leaderboard";
        const MEDALS = ["🥇", "🥈", "🥉"];

        // ── Toast ──
        function showToast(msg, type = "success") {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = "toast " + type;
            setTimeout(() => t.className = "toast hidden", 3000);
        }

        // ── Tab switching ──
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll(".tab").forEach((el, i) => {
                const tabs = ["leaderboard", "submit", "player"];
                el.classList.toggle("active", tabs[i] === tab);
            });
            document.getElementById("view-leaderboard").classList.toggle("hidden", tab !== "leaderboard");
            document.getElementById("view-submit").classList.toggle("hidden", tab !== "submit");
            document.getElementById("view-player").classList.toggle("hidden", tab !== "player");

            if (tab === "leaderboard") fetchLeaderboard();
        }

        // ── Game selector ──
        function selectGame(game) {
            currentGame = game;
            document.querySelectorAll(".game-btn").forEach(el => {
                el.classList.toggle("active", el.textContent.trim() === game);
            });
            document.getElementById("lb-game-name").textContent = game;
            if (currentTab === "leaderboard") fetchLeaderboard();
        }

        // ── Fetch Leaderboard ──
        async function fetchLeaderboard() {
            const container = document.getElementById("lb-content");
            container.innerHTML = '<div class="loading"><span class="spinner">⚡</span><br>Loading...</div>';

            try {
                const res = await fetch(`${API}/leaderboard/${currentGame}?limit=25`);
                const data = await res.json();
                const entries = data.entries || [];

                if (entries.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <div class="big">🏜️</div>
                            <p>No scores yet for <strong>${currentGame}</strong>. Submit one!</p>
                        </div>`;
                    return;
                }

                let html = `<div class="grid-header">
                    <span>Rank</span><span>Player</span><span>ID</span>
                    <span style="text-align:right">Score</span>
                    <span style="text-align:right">Time</span>
                </div>`;

                entries.forEach((e, i) => {
                    const cls = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
                    const time = new Date(e.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

                    html += `<div class="entry ${cls}">
                        <span class="rank ${i < 3 ? 'medal' : 'normal'}">${i < 3 ? MEDALS[i] : '#' + e.rank}</span>
                        <span class="name ${cls}">${e.playerName}</span>
                        <span class="pid">${e.playerId}</span>
                        <span class="score ${i === 0 ? 'top' : ''}">${e.score.toLocaleString()}</span>
                        <span class="time">${time}</span>
                    </div>`;
                });

                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<div class="empty"><div class="big">❌</div><p>Failed to load leaderboard</p></div>';
                showToast("Failed to fetch leaderboard", "error");
            }
        }

        // ── Submit Score ──
        async function submitScore() {
            const playerId = document.getElementById("f-playerId").value.trim();
            const playerName = document.getElementById("f-playerName").value.trim();
            const score = document.getElementById("f-score").value.trim();
            const gameId = document.getElementById("f-gameId").value;

            if (!playerId || !playerName || !score) {
                showToast("Fill in all fields", "error");
                return;
            }

            try {
                const res = await fetch(`${API}/scores`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ playerId, playerName, gameId, score: parseInt(score) }),
                });
                const data = await res.json();

                if (res.ok) {
                    showToast(`Score submitted! ${playerName}: ${parseInt(score).toLocaleString()}`);
                    document.getElementById("f-playerId").value = "";
                    document.getElementById("f-playerName").value = "";
                    document.getElementById("f-score").value = "";
                } else {
                    showToast(data.error || "Submission failed", "error");
                }
            } catch (err) {
                showToast("Network error", "error");
            }
        }

        // ── Player Lookup ──
        async function lookupPlayer() {
            const playerId = document.getElementById("f-lookup").value.trim();
            if (!playerId) return;

            const container = document.getElementById("player-content");
            container.innerHTML = '<div class="loading">Searching...</div>';

            try {
                const [rankRes, histRes] = await Promise.all([
                    fetch(`${API}/leaderboard/${currentGame}/player/${playerId}`),
                    fetch(`${API}/players/${playerId}/scores`),
                ]);

                const rankData = await rankRes.json();
                const histData = await histRes.json();

                let html = "";

                // Rank card
                if (rankRes.ok && rankData.found) {
                    html += `<div class="rank-card">
                        <h3>Rank in ${currentGame}</h3>
                        <div class="stats">
                            <div>
                                <div class="stat-label">Rank</div>
                                <div class="stat-value rank-num">#${rankData.playerRank}</div>
                            </div>
                            <div>
                                <div class="stat-label">Score</div>
                                <div class="stat-value">${rankData.playerEntry?.score?.toLocaleString() || "—"}</div>
                            </div>
                            <div>
                                <div class="stat-label">Out of</div>
                                <div class="stat-value total">${rankData.totalPlayers}</div>
                            </div>
                        </div>`;

                    if (rankData.nearby && rankData.nearby.length > 0) {
                        html += `<div class="nearby-title">Nearby Players</div>`;
                        rankData.nearby.forEach(n => {
                            const hl = n.playerId === playerId ? "highlight" : "";
                            html += `<div class="nearby-row ${hl}">
                                <span>#${n.rank} ${n.playerName}</span>
                                <span class="nearby-score">${n.score.toLocaleString()}</span>
                            </div>`;
                        });
                    }
                    html += `</div>`;
                } else if (rankRes.ok || rankRes.status === 404) {
                    html += `<div class="empty" style="margin-bottom:16px">
                        <div class="big">🤷</div>
                        <p>Player <strong>${playerId}</strong> not found in ${currentGame}</p>
                    </div>`;
                }

                // History card
                if (histRes.ok && histData.scores && histData.scores.length > 0) {
                    html += `<div class="history-card">
                        <h3>Score History (${histData.totalScores} total)</h3>`;
                    histData.scores.forEach(s => {
                        const time = new Date(s.timestamp).toLocaleString();
                        html += `<div class="history-row">
                            <div>
                                <span class="history-game">${s.gameId}</span>
                                <span class="history-time">${time}</span>
                            </div>
                            <span class="history-score">${s.score.toLocaleString()}</span>
                        </div>`;
                    });
                    html += `</div>`;
                }

                container.innerHTML = html || '<div class="empty"><div class="big">🤷</div><p>No data found</p></div>';
            } catch (err) {
                container.innerHTML = '<div class="empty"><div class="big">❌</div><p>Lookup failed</p></div>';
                showToast("Lookup failed", "error");
            }
        }

        // Load leaderboard on start
        fetchLeaderboard();
    </script>
</body>
</html>
