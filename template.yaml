AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Real-Time Multiplayer Game Leaderboard API v2
  CSC 575 / SER 375 - Option B: Developing NoSQL Solutions
  Features: Cognito Auth, DynamoDB Streams, Global Tables, Best Player Tracker

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: java17
    Architectures:
      - x86_64
    Environment:
      Variables:
        TABLE_NAME: !Ref LeaderboardTable
        STATS_TABLE_NAME: !Ref PlayerStatsTable
  Api:
    Cors:
      AllowMethods: "'GET,POST,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"

Resources:

  # ─── Cognito User Pool (Admin Authentication) ───
  AdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: LeaderboardAdminPool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: LeaderboardAdminClient
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED

  # ─── DynamoDB: Main Leaderboard Table ───
  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GameLeaderboard
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ─── DynamoDB: Player Stats / Cache Table ───
  # Auto-updated by DynamoDB Streams — tracks best player per game and overall
  PlayerStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PlayerStats
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # ─── Lambda: Submit Score ───
  SubmitScoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.SubmitScoreHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Validates and writes a player score to DynamoDB
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        SubmitScore:
          Type: Api
          Properties:
            Path: /scores
            Method: post

  # ─── Lambda: Get Leaderboard ───
  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.GetLeaderboardHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Returns ranked leaderboard for a given game
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        GetLeaderboard:
          Type: Api
          Properties:
            Path: /leaderboard/{gameId}
            Method: get

  # ─── Lambda: Get Player Rank ───
  GetPlayerRankFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.GetPlayerRankHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Returns a specific player's rank and nearby players
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        GetPlayerRank:
          Type: Api
          Properties:
            Path: /leaderboard/{gameId}/player/{playerId}
            Method: get

  # ─── Lambda: Get Player History ───
  GetPlayerHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.GetPlayerHistoryHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Returns all scores submitted by a specific player
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        GetPlayerHistory:
          Type: Api
          Properties:
            Path: /players/{playerId}/scores
            Method: get

  # ─── Lambda: Delete Score (Admin - Cognito Protected) ───
  DeleteScoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.DeleteScoreHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Removes a score entry - requires admin auth
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        DeleteScore:
          Type: Api
          Properties:
            Path: /admin/delete
            Method: post

  # ─── Lambda: Get Best Players (reads from stats cache) ───
  GetBestPlayersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.GetBestPlayersHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Returns best players across all games from stats cache
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerStatsTable
      Events:
        GetBestPlayers:
          Type: Api
          Properties:
            Path: /stats/best-players
            Method: get

  # ─── Lambda: Stream Processor (auto-updates stats cache) ───
  StreamProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.StreamProcessorHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Processes DynamoDB Streams to auto-update player stats cache
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerStatsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt LeaderboardTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 10

  # ─── Lambda: Admin Auth (Cognito login endpoint) ───
  AdminAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.AdminAuthHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Authenticates admin users via Cognito
      Environment:
        Variables:
          TABLE_NAME: !Ref LeaderboardTable
          STATS_TABLE_NAME: !Ref PlayerStatsTable
          USER_POOL_ID: !Ref AdminUserPool
          CLIENT_ID: !Ref AdminUserPoolClient
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminInitiateAuth
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminGetUser
              Resource: !GetAtt AdminUserPool.Arn
      Events:
        Login:
          Type: Api
          Properties:
            Path: /admin/login
            Method: post
        Signup:
          Type: Api
          Properties:
            Path: /admin/signup
            Method: post

  # ─── Lambda: Verify Token ───
  VerifyTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.leaderboard.handlers.VerifyTokenHandler::handleRequest
      CodeUri: target/game-leaderboard-api-1.0.0.jar
      Description: Verifies Cognito JWT tokens for admin operations
      Environment:
        Variables:
          TABLE_NAME: !Ref LeaderboardTable
          STATS_TABLE_NAME: !Ref PlayerStatsTable
          USER_POOL_ID: !Ref AdminUserPool
          CLIENT_ID: !Ref AdminUserPoolClient
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:GetUser
              Resource: !GetAtt AdminUserPool.Arn
      Events:
        Verify:
          Type: Api
          Properties:
            Path: /admin/verify
            Method: post

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  LeaderboardTableName:
    Description: DynamoDB table name
    Value: !Ref LeaderboardTable
  PlayerStatsTableName:
    Description: Player stats cache table
    Value: !Ref PlayerStatsTable
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref AdminUserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref AdminUserPoolClient
